<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Hub | Asilbek Design</title>
    
    <!-- Premium Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Ikonkalar uchun Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Interactive Mouse Follow Glow -->
    <div id="mouse-glow"></div>

    <!-- Background Elements -->
    <div class="bg-overlay">
        <div class="bg-grid"></div>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeBtn">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Header Section -->
    <header class="header-section">
        <div class="avatar-container">
            <img src="Asilbek.jpg" alt="Asilbek" class="avatar-img">
        </div>
        <h1 class="name">Asilbek</h1>
        <p class="bio">Digital Artist & Interface Architect <br>Transforming ideas into aesthetic realities.</p>
    </header>

    <!-- Links List -->
    <main class="links-wrapper">
        <a href="#" class="link-card">
            <i class="fab fa-telegram"></i>
            <span>Telegram Channel</span>
            <i class="fas fa-chevron-right arrow"></i>
        </a>
        <a href="#" class="link-card">
            <i class="fab fa-instagram"></i>
            <span>Instagram Feed</span>
            <i class="fas fa-chevron-right arrow"></i>
        </a>
        <a href="#" class="link-card">
            <i class="fas fa-layer-group"></i>
            <span>Recent Portfolio</span>
            <i class="fas fa-chevron-right arrow"></i>
        </a>
        <a href="#" class="link-card">
            <i class="fab fa-github"></i>
            <span>GitHub Repositories</span>
            <i class="fas fa-chevron-right arrow"></i>
        </a>
        <a href="#" class="link-card">
            <i class="fab fa-linkedin"></i>
            <span>Professional Profile</span>
            <i class="fas fa-chevron-right arrow"></i>
        </a>
        <a href="#" class="link-card link-primary">
            <i class="fas fa-paper-plane"></i>
            <span>Get in Touch</span>
            <i class="fas fa-arrow-right arrow"></i>
        </a>
    </main>

    <!-- Footer Socials -->
    <footer class="footer-socials">
        <a href="#" class="social-item"><i class="fab fa-twitter"></i></a>
        <a href="#" class="social-item"><i class="fab fa-dribbble"></i></a>
        <a href="#" class="social-item"><i class="fab fa-behance"></i></a>
    </footer>

    <script>
        // Theme Switcher
        const themeBtn = document.getElementById('themeBtn');
        const html = document.documentElement;
        const themeIcon = themeBtn.querySelector('i');

        themeBtn.addEventListener('click', () => {
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                themeIcon.className = 'fas fa-sun';
            } else {
                html.setAttribute('data-theme', 'dark');
                themeIcon.className = 'fas fa-moon';
            }
        });

        // Mouse Follow Glow
        const glow = document.getElementById('mouse-glow');
        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // Water Ripple Effect
        window.addEventListener('click', (e) => {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);

            // Remove ripple after animation ends
            setTimeout(() => {
                ripple.remove();
            }, 1200);
        });
    </script>

</body>
</html>
